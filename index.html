<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页解密游戏-空白档案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "SimHei", monospace;
            background-color: #0a0e14;
            color: #c8c8c8;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 网格背景效果 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 120, 200, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 120, 200, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            animation: gridMove 20 linear infinite;
        }

        @keyframes gridMove {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: 40px 40px;
            }
        }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 0, 0, 0.3) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 1;
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            max-width: 780px;
            margin: 0 auto;
            padding: 60px 40px 80px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部标题 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            flex-shrink: 0;
            opacity: 0;
            animation: fadeIn 1 ease forwards;
        }

        .header h1 {
            font-size: 28px;
            color: #4a9eff;
            letter-spacing: 8px;
            font-weight: normal;
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }

        .header .sub-title {
            font-size: 14px;
            color: #5a6a7a;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, transparent, #2a4a6a, transparent);
            margin: 20px 0;
        }

        /* 故事文本区域 - 可滚动 */
        .story-box {
            background: rgba(10, 20, 30, 0.7);
            border: 1px solid #1a3a5a;
            border-radius: 4px;
            padding: 35px 40px;
            margin-bottom: 30px;
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            line-height: 2;
            font-size: 15px;
            color: #b0c4d8;
            text-indent: 2em;
            scroll-behavior: smooth;
        }

        /* 自定义滚动条 */
        .story-box::-webkit-scrollbar {
            width: 6px;
        }

        .story-box::-webkit-scrollbar-track {
            background: rgba(20, 40, 60, 0.3);
        }

        .story-box::-webkit-scrollbar-thumb {
            background: #2a5a8a;
            border-radius: 3px;
        }

        .story-box::-webkit-scrollbar-thumb:hover {
            background: #3a7aba;
        }

        .story-text {
            white-space: pre-wrap;
            display: block;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background-color: #4a9eff;
            animation: blink 0.8 infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 提示区域 */
        .warning-box {
            background: rgba(60, 30, 30, 0.4);
            border: 1px solid #6a3030;
            border-left: 4px solid #c04040;
            padding: 18px 25px;
            margin-bottom: 35px;
            font-size: 13px;
            color: #d4a0a0;
            display: none;
            line-height: 1.8;
            flex-shrink: 0;
        }

        .warning-box strong {
            color: #ff6b6b;
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
        }

        /* 按钮区域 */
        .btn-container {
            text-align: center;
            display: none;
            flex-shrink: 0;
        }

        .start-btn {
            background: transparent;
            border: 1px solid #2a5a8a;
            color: #6ab0ff;
            padding: 14px 50px;
            font-size: 16px;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.3 ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .start-btn:hover {
            background: rgba(74, 158, 255, 0.15);
            border-color: #4a9eff;
            color: #8cc4ff;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
        }

        .start-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(74, 158, 255, 0.2), transparent);
            transition: left 0.5 ease;
        }

        .start-btn:hover::before {
            left: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 底部状态栏 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 10px 20px;
            font-size: 12px;
            color: #3a5060;
            display: flex;
            justify-content: space-between;
            z-index: 3;
        }

        .blink-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #3a8a3a;
            border-radius: 50%;
            margin-right: 6px;
            animation: blink 2 infinite;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="scanline"></div>

    <div class="container">
        <div class="header">
            <h1>空白档案</h1>
            <div class="sub-title">Blank Dossier</div>
            <div class="divider"></div>
        </div>

        <div class="story-box" id="storyBox">
            <span class="story-text" id="storyText"></span><span class="cursor" id="cursor"></span>
        </div>

        <div class="warning-box" id="warningBox">
            <strong>游戏提示</strong>
            请勿通过修改网址、直接查看源代码等方式获取线索，这将严重影响游戏体验。<br>
            所有线索均可通过网站内的点击操作、搜索功能等正常交互途径获得。
        </div>

        <div class="btn-container" id="btnContainer">
            <button class="start-btn" onclick="startGame()">开 始 调 查</button>
        </div>
    </div>

    <div class="footer">
        <span><span class="blink-dot"></span>系统状态：正常</span>
        <span>访问时间：2024-06-20 23:47</span>
    </div>

    <script>
        const storyContent = `
弟弟的成绩一直不好，高中毕业以后就早早踏入了社会。

几天前，他兴冲冲地告诉我，在一个叫聘什么的招聘网站上找到了一份还不错的工作，地点在宁洲市东湖区。为了方便上班，他在公司附近租了一间小房子。

六月一日那天，在我心里他始终还是个没长大的孩子。我买了蛋糕和礼物，想去他的出租屋陪他过个儿童节。可电话打了一遍又一遍，始终无人接听。

我找到他租住的地方，房门紧锁，屋内空无一人。邻居说已经好几天没见过他了。

我慌了神，立刻跑到辖区派出所报案。接待我的民警做了笔录，说已经登记在案，让我回家等消息。

可是，快二十天过去了，没有任何音讯。

今天，我再次来到警局询问进展。可窗口的民警却告诉我——系统里没有任何报案记录，他们从未接收过此案，也从未见过我。

所有人都在告诉我，是我记错了。

走投无路的夜里，某种说不清的第六感驱使着我，打开了宁洲市东湖区公安局的官方网站。

我有一种强烈的预感——真相，就藏在这片冰冷的互联网深处。`;

        const storyBox = document.getElementById('storyBox');
        const storyText = document.getElementById('storyText');
        const cursor = document.getElementById('cursor');
        const warningBox = document.getElementById('warningBox');
        const btnContainer = document.getElementById('btnContainer');
        
        let index = 0;
        const typeSpeed = 45; // 打字速度，毫秒

        function typeWriter() {
            if (index < storyContent.length) {
                storyText.textContent += storyContent.charAt(index);
                index++;
                // 自动滚动到底部
                storyBox.scrollTop = storyBox.scrollHeight;
                setTimeout(typeWriter, typeSpeed);
            } else {
                // 打字结束，隐藏光标，显示提示和按钮
                cursor.style.display = 'none';
                setTimeout(() => {
                    warningBox.style.display = 'block';
                    warningBox.style.animation = 'fadeIn 0.8s ease forwards';
                }, 500);
                setTimeout(() => {
                    btnContainer.style.display = 'block';
                    btnContainer.style.animation = 'fadeIn 0.8s ease forwards';
                }, 1200);
            }
        }

        function startGame() {
            // 按钮点击过渡效果
            document.body.style.transition = 'opacity 0.5s ease';
            document.body.style.opacity = '0';
            setTimeout(() => {
                window.location.href = '/game/01gonganju.html';
            }, 500);
        }

        // 页面加载后延迟开始打字
        window.onload = function() {
            setTimeout(typeWriter, 1000);
        };

        // 点击页面任意位置加速跳过打字效果
        document.addEventListener('click', function(e) {
            if (index < storyContent.length && !e.target.classList.contains('start-btn')) {
                index = storyContent.length;
                storyText.textContent = storyContent;
                storyBox.scrollTop = storyBox.scrollHeight;
                cursor.style.display = 'none';
                setTimeout(() => {
                    warningBox.style.display = 'block';
                    warningBox.style.animation = 'fadeIn 0.8s ease forwards';
                }, 300);
                setTimeout(() => {
                    btnContainer.style.display = 'block';
                    btnContainer.style.animation = 'fadeIn 0.8s ease forwards';
                }, 800);
            }
        });
    </script>
</body>
</html>
