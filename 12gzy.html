
<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
    <title>专网办公系统 - 宁洲市东湖区公安局</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", SimHei, sans-serif;
        }
        body {
            background: #fff;
            font-size: 14px;
        }
        /* 头部顶部logo区 */
        .header-top {
            width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 10px 0;
            gap: 12px;
        }
        .logo-img {
            width: 80px;
            height: 80px;
 }
        .logo-text h1 {
            color: #0044aa;
            font-size: 30px;
            font-weight: bold;
        }
        .logo-text p {
            color: #0044aa;
            text-align: left;
            letter-spacing: 1px;
        }
        .user-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            color: #333;
            font-size: 14px;
        }
        .user-info a {
            color: #dd2222;
            text-decoration: none;
            margin-left: 12px;
        }
        .user-info a:hover {
            text-decoration: underline;
        }
        /* 主容器 960px居中 */
        .container {
            width: 960px;
            margin: 0 auto;
            min-height: 450px;
        }
        .block-title {
            background: #0066cc;
            color: #fff;
            padding: 6px 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* 左侧导航栏 */
        .sidebar {
 width: 200px;
            background: #f0f7ff;
            border: 1px solid #b8d8f8;
            float: left;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar li a {
            display: block;
            padding: 12px 15px;
            color: #003377;
            text-decoration: none;
            border-bottom: 1px solid #cce0f5;
            cursor: pointer;
        }
        .sidebar li.active a {
            background: #0066cc;
            color: #fff;
        }
        .sidebar li a:hover {
            background: #d6e8ff;
            color: #003377;
        }
        .sidebar li.active a:hover {
            background: #0066cc;
 color: #fff;
        }
        /* 右侧内容区 */
        .content-wrap {
            width: 740px;
            background: #f0f7ff;
            border: 1px solid #b8d8f8;
            float: right;
            min-height: 450px;
        }
        .content-body {
            padding: 15px;
        }
        /* 通用列表样式 */
        .common-list {
            list-style: none;
        }
        .common-list li {
            line-height: 30px;
            border-bottom: 1px dotted #cce0f5;
            padding: 4px 2px;
        }
        .common-list a {
            color: #003377;
            text-decoration: none;
            cursor: pointer;
        }
        .common-list a:hover {
            color: #dd2222;
            text-decoration: underline;
        }
        /* 空状态提示 */
        .empty-tip {
            padding: 80px 0;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
        /* 详情页样式 */
        .detail-box {
            line-height: 2;
            color: #333;
        }
        .detail-box h3 {
            color: #003377;
            border-bottom: 1px dotted #cce0f5;
            padding-bottom: 10px;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .back-btn {
            margin-bottom: 10px;
        }
        .back-btn a {
            color: #0044aa;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }
        .back-btn a:hover {
            color: #dd2222;
            text-decoration: underline;
        }
        /* 数据提示 */
        .data-warning {
            color: #888;
            font-size: 12px;
            text-align: right;
            margin-bottom: 12px;
 padding-bottom: 8px;
            border-bottom: 1px dotted #cce0f5;
        }
 /* 清除浮动 */
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }
        /* 页脚版权 */
        .footer {
            text-align: center;
            font-size: 12px;
            color: #555;
            line-height: 22px;
            padding: 10px 0;
            border-top: 1px solid #cce0f5;
            margin-top: 20px;
            clear: both;
        }
        /* 面板默认隐藏 */
        .panel {
            display: none;
        }
        .panel.active {
            display: block;
        }
    </style>
</head>
<body>
<!-- 头部Logo+用户信息 -->
<div class="header-top">
    <div class="logo-img">
        <img src="/game/pic/01logo.png" alt="公安国徽" width="80" height="80">
    </div>
    <div class="logo-text">
 <h1>专网办公系统</h1>
<p>宁洲市东湖区公安局</p>
</div>
    <div class="user-info">
        <span>欢迎你，顾振义</span>
        <a href="/game/01zhuanwang.html">退出登录</a>
    </div>
</div>

<div class="container clearfix">
    <!-- 左侧导航栏 -->
    <div class="sidebar">
        <div class="block-title">办公导航</div>
        <ul>
<li class="active" data-target="notice"><a>工作通知</a></li>
            <li data-target="memo"><a>备忘录</a></li>
 <li data-target="mail"><a>收件箱</a></li>
            <li data-target="sendMail"><a>发件箱</a></li>
 </ul>
    </div>

    <!-- 右侧内容区 -->
    <div class="content-wrap">
        <div class="block-title" id="contentTitle">工作通知</div>
        <div class="content-body">
            <!-- 工作通知面板 -->
            <div class="panel active" id="noticePanel">
                <div class="empty-tip">近30天无新增工作通知</div>
            </div>

            <!-- 备忘录面板 -->
            <div class="panel" id="memoPanel">
                <!-- 备忘录列表 -->
                <div class="memo-list">
                    <ul class="common-list">
                        <li><a data-memo="1">2026-1-30</a></li>
                        <li><a data-memo="2">2026-1-25</a></li>
                        <li><a data-memo="3">2025-11-06</a></li>
 </ul>
                </div>
                <!-- 备忘录详情 -->
                <div class="memo-detail panel" id="memoDetail">
                    <div class="back-btn"><a id="memoBack">← 返回备忘录列表</a></div>
                    <div class="detail-box">
                        <h3 id="memoDetailTitle"></h3>
 <div id="memoDetailContent"></div>
                    </div>
                </div>
            </div>

            <!-- 收件箱面板 -->
            <div class="panel" id="mailPanel">
                <!-- 邮件列表 -->
                <div class="mail-list">
                    <ul class="common-list">
                        <li><a data-mail="1">[广告]找好员工 上聘查查</a></li>
                        <li><a data-mail="2">安宁建工</a></li>
                        <li><a data-mail="3">祝贺函</a></li>
                    </ul>
                </div>
                <!-- 邮件详情 -->
                <div class="mail-detail panel" id="mailDetail">
                    <div class="back-btn"><a id="mailBack">← 返回收件箱列表</a></div>
                    <div class="detail-box">
                        <h3 id="mailDetailTitle"></h3>
<div class="data-warning">收件邮件，已同步至本地</div>
                        <div id="mailDetailContent"></div>
                    </div>
                </div>
            </div>

            <!-- 发件箱面板 -->
 <div class="panel" id="sendMailPanel">
 <!-- 发件箱列表 -->
                <div class="sendMail-list">
<ul class="common-list">
<li><a data-sendmail="1">致老友的任职答谢信</a></li>
<li><a data-sendmail="2">安宁建工回复</a></li>
                    </ul>
                </div>
                <!-- 发件箱详情 -->
                <div class="sendMail-detail panel" id="sendMailDetail">
                    <div class="back-btn"><a id="sendMailBack">← 返回发件箱列表</a></div>
<div class="detail-box">
 <h3 id="sendMailDetailTitle"></h3>
                        <div class="data-warning">已发送邮件，存档保留</div>
<div id="sendMailDetailContent"></div>
 </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚版权信息 -->
    <div class="footer">
        本网站为解密游戏 本页面为虚构内容，所有名称、事件、文件均为架空设定，与现实无关<br>
        12
    </div>
</div>

<script>
    // 备忘录数据
    var memoData = {
        1: { 
            title: '2026-1-30', 
            content: '保安全（banq.com)加密邮箱<a href="/game/13banq.html" target="_blank">网址点击进入</a> ' 
        },
        2: { 
            title: '2026-1-25', 
            content: '    东湖区开发项目的协助工作也正式转移到我身上了，片区警力规划、治安配套方案都由我牵头对接。想来也是，能力越大责任越大，手里的权柄越重，往后能做的事也就越多。之前的铺垫总算没白费，一步步都在按预想的走。' 
        },
        3: { 
            title: '2025-11-06', 
            content: '    最近他身体越来越不行了，气色一天比一天差，连上三楼都要歇两趟。这几天也不能忘了每天去给他端茶倒水，嘘寒问暖不能断，分寸得拿捏好。照这个势头看，马上就能成了，熬了这么久，总算要等到头了。' 
 }

    };

    // 收件箱数据
    var mailData = {
        1: { 
            title: '[广告]找好员工 上聘查查 ', 
            content: '聘查查是国内领先的招聘服务平台，专注于为企事业单位提供人员背景核查、资质核验、用工风险筛查等专业服务。\n\n提供定制化招聘解决方案，协助用人单位精准核实应聘人员履历信息，规避用工风险，筑牢人事安全第一道防线。' 
        },
        2: { 
            title: '安宁建工', 
            content: '您好！我司为宁洲安宁建工集团，目前正牵头推进东湖区永和路片区综合开发项目。为保障项目建设期间工地安全与周边治安秩序，践行“为建设安全保驾护航”的企业理念，我司希望能与贵局开展警务协作对接，为项目建设提供治安便利与支持。\n\n如有意向，可通过我的私人工作邮箱联系：48211523@banq.com，\n\n顺颂公祺' 
        },
        3: { 
            title: '祝贺函', 
            content: '振义同志：\n\n喜闻你近期升任东湖区公安局副局长，特此致信，向你表示诚挚的祝贺。\n\n你多年来扎根基层、业务扎实、处事周全，此次提拔是组织对你能力与付出的充分肯定，也是众望所归。\n\n望你在新的岗位上再接再厉，再立新功。往后工作中若有需要配合之处，尽管开口。\n\n老友 敬上' 
        }
    };

    // 发件箱数据
    var sendMailData = {

        2: { 
            title: '安宁建工回复', 
            content: '针对东湖区开发项目的警务协作事宜，我愿意就项目建设期间的治安保障、警务对接等事项开展合作，为项目建设提供必要的便利与支持。\n\n我的私人邮箱：41398468@banq.com我亲自和你对接' 
        },
        1: {
            title: '致老友的任职答谢信',
            content: '老兄：\n\n来信收到，十分感谢你的祝贺与挂念。\n\n此次能走上新的岗位，离不开组织的信任，也少不了各位老友平日的支持与帮衬。岗位变了，职责更重了，往后工作中还望你多多提点、多多配合。\n\n等过阵子忙完手头的事，约个时间一起坐坐，当面致谢。\n\n顺颂安好\n顾振义\n2026年1月17日' 
        }
    };

    var navItems = document.querySelectorAll('.sidebar li');
    var contentTitle = document.getElementById('contentTitle');
    var noticePanel = document.getElementById('noticePanel');
    var memoPanel = document.getElementById('memoPanel');
    var mailPanel = document.getElementById('mailPanel');
    var sendMailPanel = document.getElementById('sendMailPanel');
    var memoDetail = document.getElementById('memoDetail');
    var mailDetail = document.getElementById('mailDetail');
    var sendMailDetail = document.getElementById('sendMailDetail');

    // 左侧导航切换
    navItems.forEach(function(item) {
        item.addEventListener('click', function() {
            // 切换导航高亮
            navItems.forEach(function(i) { i.classList.remove('active'); });
            item.classList.add('active');

            var target = item.getAttribute('data-target');
            // 隐藏所有面板
            noticePanel.classList.remove('active');
            memoPanel.classList.remove('active');
            mailPanel.classList.remove('active');
            sendMailPanel.classList.remove('active');
            memoDetail.classList.remove('active');
            mailDetail.classList.remove('active');
            sendMailDetail.classList.remove('active');

            // 显示对应面板
            if (target === 'notice') {
                noticePanel.classList.add('active');
                contentTitle.innerText = '工作通知';
            } else if (target === 'memo') {
                memoPanel.classList.add('active');
                // 默认显示列表
                document.querySelector('.memo-list').style.display = 'block';
                memoDetail.classList.remove('active');
                contentTitle.innerText = '备忘录';
            } else if (target === 'mail') {
                mailPanel.classList.add('active');
                document.querySelector('.mail-list').style.display = 'block';
                mailDetail.classList.remove('active');
                contentTitle.innerText = '收件箱';
            } else if (target === 'sendMail') {
                sendMailPanel.classList.add('active');
                document.querySelector('.sendMail-list').style.display = 'block';
                sendMailDetail.classList.remove('active');
                contentTitle.innerText = '发件箱';
            }
        });
    });

    // 备忘录条目点击进入详情
    document.querySelectorAll('.memo-list a').forEach(function(a) {
        a.addEventListener('click', function() {
            var id = a.getAttribute('data-memo');
            var data = memoData[id];
            document.getElementById('memoDetailTitle').innerText = data.title;
            document.getElementById('memoDetailContent').innerHTML = data.content;

            document.querySelector('.memo-list').style.display = 'none';
            memoDetail.classList.add('active');
        });
    });

    // 备忘录返回列表
    document.getElementById('memoBack').addEventListener('click', function() {
        memoDetail.classList.remove('active');
        document.querySelector('.memo-list').style.display = 'block';
    });

    // 收件箱条目点击进入详情
    document.querySelectorAll('.mail-list a').forEach(function(a) {
        a.addEventListener('click', function() {
            var id = a.getAttribute('data-mail');
            var data = mailData[id];
            document.getElementById('mailDetailTitle').innerText = data.title;
            document.getElementById('mailDetailContent').innerText = data.content;

            document.querySelector('.mail-list').style.display = 'none';
            mailDetail.classList.add('active');
        });
    });

    // 收件箱返回列表
    document.getElementById('mailBack').addEventListener('click', function() {
        mailDetail.classList.remove('active');
        document.querySelector('.mail-list').style.display = 'block';
    });

    // 发件箱条目点击进入详情
    document.querySelectorAll('.sendMail-list a').forEach(function(a) {
        a.addEventListener('click', function() {
            var id = a.getAttribute('data-sendmail');
            var data = sendMailData[id];
            document.getElementById('sendMailDetailTitle').innerText = data.title;
            document.getElementById('sendMailDetailContent').innerText = data.content;

            document.querySelector('.sendMail-list').style.display = 'none';
            sendMailDetail.classList.add('active');
        });
    });

    // 发件箱返回列表
    document.getElementById('sendMailBack').addEventListener('click', function() {
        sendMailDetail.classList.remove('active');
        document.querySelector('.sendMail-list').style.display = 'block';
    });
</script>
</body>
</html>
