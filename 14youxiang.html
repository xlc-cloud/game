<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>收件箱 - 保安全加密邮箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* 顶部导航栏 */
        .header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 255, 170, 0.1);
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00ffaa 0%, #00b894 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 18px;
            height: 18px;
            fill: #0a0e17;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: #94a3b8;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            background: #1e293b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: #00ffaa;
            font-weight: 500;
        }

        /* 主布局 */
        .main-container {
            display: flex;
            height: calc(100vh - 60px);
        }

        /* 侧边栏 */
        .sidebar {
            width: 240px;
            background: #0f172a;
            border-right: 1px solid #1e293b;
            padding: 20px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            font-size: 14px;
            color: #94a3b8;
        }

        .nav-item:hover {
            background: rgba(0, 255, 170, 0.05);
            color: #e2e8f0;
        }

        .nav-item.active {
            background: rgba(0, 255, 170, 0.08);
            color: #00ffaa;
            border-left-color: #00ffaa;
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        .nav-badge {
            margin-left: auto;
            background: #00ffaa;
            color: #0a0e17;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* 邮件列表区 */
        .mail-list {
            width: 360px;
            background: #0f172a;
            border-right: 1px solid #1e293b;
            overflow-y: auto;
        }

        .list-header {
            padding: 16px 20px;
            border-bottom: 1px solid #1e293b;
            font-size: 14px;
            font-weight: 500;
            color: #cbd5e1;
        }

        .mail-item {
            padding: 16px 20px;
            border-bottom: 1px solid #1e293b;
            cursor: pointer;
            transition: background 0.2s ease;
            position: relative;
        }

        .mail-item:hover {
            background: rgba(0, 255, 170, 0.03);
        }

        .mail-item.active {
            background: rgba(0, 255, 170, 0.06);
        }

        .mail-item.unread::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: #00ffaa;
            border-radius: 50%;
        }

        .mail-item.unread .mail-subject {
            color: #f1f5f9;
            font-weight: 500;
        }

        .mail-from {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .mail-time {
            font-size: 12px;
            color: #64748b;
        }

        .mail-subject {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mail-preview {
            font-size: 12px;
            color: #64748b;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mail-item.sent .mail-from span:first-child::before {
            content: '发送至: ';
            color: #64748b;
        }

        /* 邮件内容区 */
        .mail-content {
            flex: 1;
            padding: 32px 40px;
            overflow-y: auto;
        }

        .mail-detail-header {
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1e293b;
        }

        .mail-detail-subject {
            font-size: 22px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 16px;
        }

        .mail-detail-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .sender-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00ffaa 0%, #00b894 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0e17;
            font-weight: 600;
            font-size: 14px;

        .sender-avatar.sent {

            color: #cbd5e1;

        .sender-info {
            flex: 1;
        }

        .sender-name {
            font-size: 14px;
            color: #e2e8f0;
            font-weight: 500;
            margin-bottom: 2px;

        .sender-email {
            font-size: 13px;
            color: #64748b;
        }

        .mail-date {
            font-size: 13px;
            color: #64748b;
        }

        .mail-body {
            font-size: 15px;
            line-height: 1.8;
            color: #cbd5e1;
        }

        .mail-body p {
            margin-bottom: 16px;

        .mail-body .signature {

            border-top: 1px dashed #1e293b;
            color: #64748b;
            font-size: 13px;
        }

        /* 加密标识 */
        .encrypted-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid rgba(0, 255, 170, 0.2);
            border-radius: 6px;
            font-size: 12px;
            color: #00ffaa;
            margin-bottom: 16px;
        }

        .encrypted-badge svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* ========== 微信风格来电弹窗 ========== */
        .wechat-call-popup {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 340px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
            padding: 16px 18px;
            z-index: 999;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            visibility: hidden;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .wechat-call-popup.show {
            opacity: 1;
            transform: translateY(0) scale(1);
            visibility: visible;
        }

        .call-popup-inner {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* 来电人头像 */
        .call-avatar {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background: linear-gradient(135deg, #b0b0b0 0%, #888888 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
        }

        .call-avatar svg {
            width: 26px;
            height: 26px;
            stroke: #fff;
            fill: none;
            stroke-width: 1.5;
        }

        /* 中间文字信息 */
        .call-info {
            flex: 1;
            min-width: 0;
        }

        .caller-name {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .call-status {
            font-size: 12px;
            color: #888888;
        }

        .call-hint-text {
            font-size: 11px;
            color: #fa5151;
            margin-top: 3px;
        }

        /* 右侧按钮组 */
        .call-buttons {
            display: flex;
            gap: 16px;
            flex-shrink: 0;
        }

        .call-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s ease;
        }

        .call-btn svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        .btn-hangup {
            background: #c9c9c9;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .btn-hangup:hover {
            transform: none;
        }

        .btn-answer {
            background: #07c160;
            cursor: pointer;
        }

        .btn-answer:hover {
            transform: scale(1.08);
        }

        .btn-answer:active {
            transform: scale(0.95);
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .mail-list { width: 280px; }
        }
    </style>
</head>

        // 生成来电铃声（使用Web Audio API）
        function playRingtone() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            
            const ctx = new AudioContext();
            
            function playTone(freq1, freq2, startTime, duration) {
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc1.type = 'sine';
                osc2.type = 'sine';
                osc1.frequency.value = freq1;
                osc2.frequency.value = freq2;
                
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.15, startTime + 0.02);
                gain.gain.setValueAtTime(0.15, startTime + duration - 0.02);
                gain.gain.linearRampToValueAtTime(0, startTime + duration);
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(ctx.destination);
                
                osc1.start(startTime);
                osc2.start(startTime);
                osc1.stop(startTime + duration);
                osc2.stop(startTime + duration);
            }

            const now = ctx.currentTime;
            for (let i = 0; i < 20; i++) {
                const t = now + i * 1.2;
                playTone(440, 480, t, 0.4);
                playTone(440, 480, t + 0.5, 0.4);
            }
            
            ringtoneAudio = ctx;
        }

        // 停止铃声
        function stopRingtone() {
            if (ringtoneAudio) {
                ringtoneAudio.close();
                ringtoneAudio = null;
            }
        }

        // 渲染邮件列表
        function renderMailList() {
            const folderMails = mails.filter(m => m.folder === currentFolder);
            
            listHeader.textContent = currentFolder === 'inbox'

                : `已发送 (${folderMails.length})`;

            updateNavBadges();
            mailListContainer.innerHTML = '';
            
            folderMails.forEach(mail => {
                const item = document.createElement('div');
                item.className = `mail-item ${mail.unread ? 'unread' : ''} ${mail.id === currentMailId ? 'active' : ''} ${currentFolder === 'sent' ? 'sent' : ''}`;
                item.dataset.id = mail.id;
                
                const displayName = currentFolder === 'inbox' ? mail.fromName : mail.toName;
                
                item.innerHTML = `
                    <div class="mail-from">
                        <span>${displayName}</span>
                        <span class="mail-time">${mail.time}</span>
                    </div>
                    <div class="mail-subject">${mail.subject}</div>
                    <div class="mail-preview">${mail.preview}</div>
                `;

                item.addEventListener('click', () => openMail(mail.id));
                mailListContainer.appendChild(item);
            });
        }

        // 更新侧边栏未读角标
        function updateNavBadges() {
            const inboxUnread = mails.filter(m => m.folder === 'inbox' && m.unread).length;
            const sentUnread = mails.filter(m => m.folder === 'sent' && m.unread).length;
            
            const inboxNav = document.querySelector('.nav-item[data-folder="inbox"]');
            const sentNav = document.querySelector('.nav-item[data-folder="sent"]');
            
            let inboxBadge = inboxNav.querySelector('.nav-badge');
            let sentBadge = sentNav.querySelector('.nav-badge');
            
            if (inboxUnread > 0) {
                if (!inboxBadge) {
                    inboxBadge = document.createElement('span');
                    inboxBadge.className = 'nav-badge';
                    inboxNav.appendChild(inboxBadge);
                }
                inboxBadge.textContent = inboxUnread;
            } else if (inboxBadge) {
                inboxBadge.remove();
            }
            
            if (sentUnread > 0) {
                if (!sentBadge) {
                    sentBadge = document.createElement('span');
                    sentBadge.className = 'nav-badge';
                    sentNav.appendChild(sentBadge);
                }
                sentBadge.textContent = sentUnread;
            } else if (sentBadge) {
                sentBadge.remove();
            }
        }

        // 检查是否全部已读
        function checkAllRead() {
            if (callTriggered) return;
            
            const allRead = mails.every(m => !m.unread);
            if (allRead) {
                callTriggered = true;
                setTimeout(() => {
                    callPopup.classList.add('show');
                    playRingtone();
                }, 3000);
            }
        }

        // 打开邮件
        function openMail(id) {
            currentMailId = id;
            const mail = mails.find(m => m.id === id);
            
            mail.unread = false;
            renderMailList();

            const isSent = mail.folder === 'sent';
            const displayName = isSent ? mail.toName : mail.fromName;
            const displayEmail = isSent ? mail.to : mail.from;

            mailContent.innerHTML = `
                <div class="encrypted-badge">
                    <svg viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    端到端加密传输
                </div>

                <div class="mail-detail-header">
                    <h1 class="mail-detail-subject">${mail.subject}</h1>
                    <div class="mail-detail-meta">
                        <div class="sender-avatar ${isSent ? 'sent' : ''}">${mail.avatar}</div>
                        <div class="sender-info">
                            <div class="sender-name">${displayName} ${isSent ? '(收件人)' : '(发件人)'}</div>
                            <div class="sender-email">${displayEmail}</div>
                        </div>
                        <div class="mail-date">${mail.time}</div>
                    </div>
                </div>

                <div class="mail-body">
                    ${mail.body}
                </div>
            `;

            checkAllRead();
        }

        // 切换文件夹
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                currentFolder = item.dataset.folder;
                
                const folderMails = mails.filter(m => m.folder === currentFolder);
                if (folderMails.length > 0) {
                    currentMailId = folderMails[0].id;
                }
                
                renderMailList();
                openMail(currentMailId);
            });
        });

        // 接听按钮：停止铃声并跳转
        answerBtn.addEventListener('click', () => {
            stopRingtone();
            window.location.href = '/game/0end.html';
        });

        // 初始化
        renderMailList();
        openMail(currentMailId);
    </script>
</body>
</html>
