<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>专网登录 - 宁洲市东湖区公安局</title>
    <style>
        * {
            margin: 0;

            box-sizing: border-box;
            font-family: "Microsoft Yahei", SimHei, sans-serif;
        }
        body {
            background: #fff;
            font-size: 14px;
        }
        /* 头部顶部logo区 */
        .header-top {
            width: 960px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            padding: 10px 0;
            gap: 12px;
        }
        .logo-img {
            width: 80px;
            height: 80px;
        }
        .logo-text h1 {
            color: #0044aa;
            font-size: 36px;
            font-weight: bold;
        }
        .logo-text p {
            color: #0044aa;
            text-align: center;
            letter-spacing: 1px;
        }
        /* 搜索框相关样式全部保留但页面删除对应DOM */
        .search-box {
            margin-left: auto;
            display: flex;
            align-items: center;
        }
        .search-input {
            height: 36px;
            width: 220px;
            border: 1px solid #ccc;
            border-right: none;
            padding: 0 10px;
            border-radius: 4px 0 0 4px;
        }
        .search-btn {
            height: 36px;
            width: 40px;
            background: #dd2222;
            border: none;
            color: #fff;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }
        /* 导航栏 */
        .nav-wrap {
            background: #0055bb;
        }
        .nav {
            width: 960px;
            margin: 0 auto;
            display: flex;
        }
        .nav a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 12px 26px;
            font-size: 16px;
        }
        .nav a.active {
            background: #ffaa00;
            color: #000;
        }
        /* 头条滚动栏 */
        .top-news-bar {
            display: none;
        }
        .top-news-bar a {
            color: #0044aa;
            text-decoration: none;
            margin-right: 12px;
        }
        /* 主容器 960px居中 */
        .container {
            width: 960px;
            margin: 0 auto;
        }
        .block-title {
            background: #0066cc;
            color: #fff;
            padding: 6px 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* 登录整块容器 */
        .login-wrap {
            width: 960px;
            background: #f0f7ff;
            border: 1px solid #b8d8f8;
            margin-bottom: 15px;
        }
        .login-content {
            padding: 60px 0;
            background: #fff;
        }
        .login-form {
            width: 380px;
            margin: 0 auto;
        }
        .form-item {
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .form-item label {
            width: 70px;
            text-align: right;
            color: #003377;
            font-size: 15px;
            flex-shrink: 0;
        }
        .form-input {
            flex: 1;
            height: 38px;
            border: 1px solid #b8d8f8;
            padding: 0 12px;
            border-radius: 3px;
            font-size: 14px;
            outline: none;
            background: #fafcff;
        }
        .form-input:focus {
            border-color: #0066cc;
            background: #fff;
        }
        .form-btn {
            text-align: center;
            margin-top: 35px;
        }
        .login-btn {
            width: 130px;
            height: 40px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 3px;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 3px;
        }
        .login-btn:hover {
            background: #0055bb;
        }
        .tech-login {
            text-align: right;
            padding-right: 35px;
            margin-top: 50px;
        }
        .tech-login a {
            color: #777;
            text-decoration: none;
            font-size: 13px;
        }
        .tech-login a:hover {
            color: #0044aa;
            text-decoration: underline;
        }
        /* 清除浮动 */
        .clearfix::after {
            content: "";
            display: table;
            clear: both;
        }
        /* 底部友链 */
        .friend-link {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            clear: both;
        }
        .link-item {
            width: 180px;
            height: 50px;
            background: #e0ecff;
            border: 1px solid #b8d8f8;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .link-item a {
            color: #0044aa;
            text-decoration: none;
        }
        /* 页脚版权 */
        .footer {
            text-align: center;
            font-size: 12px;
            color: #555;
            line-height: 22px;
            padding: 10px 0;
            clear: both;
        }
    </style>
</head>
<body>
<!-- 头部Logo区域 -->
<div class="header-top">
    <div class="logo-img">
        <img src="/game/pic/01logo.png" alt="公安国徽" width="80" height="80">
    </div>
    <div class="logo-text">
        <h1>宁洲市东湖区公安局</h1>
        <p>NINGZHOU MUNICIPAL PUBLIC SECURITY BUREAU</p>
    </div>
</div>

<!-- 导航栏（当前选中专网登录） -->
<div class="nav-wrap">
    <div class="nav">
        <a href="/game/01gonganju.html">首页</a>
        <a href="/game/01shishi.html">实时新闻</a>
        <a href="#">网上办事</a>
        <a href="/game/01gongshi.html">公示公告</a>
        <a href="/game/01juzhang.html">局长信箱</a>
        <a href="/game/01zhuanwang.html" class="active">专网登录</a>
    </div>
</div>

<!-- 顶部横幅已隐藏清空 -->
<div class="top-news-bar">
</div>

<div class="container">
    <!-- 专网登录区域 -->
    <div class="login-wrap">
        <div class="block-title">专网登录</div>
        <div class="login-content">
            <div class="login-form">
                <div class="form-item">
                    <label for="username">账号：</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入账号">
                </div>
                <div class="form-item">
                    <label for="password">密码：</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码">
                </div>
                <div class="form-btn">
                    <button class="login-btn" onclick="checkLogin()">确认登录</button>
                </div>
            </div>
            <div class="tech-login">
                <a href="/game/01jishu.html">技术人员登录</a>
            </div>
        </div>
    </div>

    <!-- 底部友情链接 -->
    <div class="friend-link">
        <div class="link-item"><a href="#">中华人民共和国公安部</a></div>
        <div class="link-item"><a href="#">宁州市检察网</a></div>
        <div class="link-item"><a href="#">宁州市中级人民法院</a></div>
        <div class="link-item"><a href="#">宁州市交警民网</a></div>
        <div class="link-item"><a href="#">宁州市司法局</a></div>
    </div>

    <!-- 页脚版权信息 -->
    <div class="footer">
        本网站为解密游戏 本页面为虚构内容，所有名称、事件、文件均为架空设定，与现实无关<br>
        01
    </div>
</div>

<script>
    // 正确账号密码
    const correctUser = 'lch00791@nzs.gov.cn';
    const correctPass = 'nzsplc@123';

    function checkLogin() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (username === correctUser && password === correctPass) {
            // 验证通过，跳转页面
            window.location.href = '/game/03liuchanghong.html';
        } else {
            alert('账号或密码错误，请重新输入');
        }
    }

    // 支持回车键登录
    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            checkLogin();
        }
    });
</script>
</body>
</html>
