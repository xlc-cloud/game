<script>
    const textA = document.getElementById('text-a');
    const textB = document.getElementById('text-b');
    let showA = true;

    function glitchToggle() {
        if (showA) {
            textA.style.display = 'none';
            textB.style.display = 'block';
        } else {
            textA.style.display = 'block';
            textB.style.display = 'none';
        }
        showA = !showA;
        // 随机间隔 200-900ms，模拟卡顿、不规律闪烁的效果
        const delay = Math.random() * 700 + 200;
        setTimeout(glitchToggle, delay);
    }

    // 页面加载完成后启动切换
    window.addEventListener('load', glitchToggle);
</script>
